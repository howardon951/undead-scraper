name: Self-Heal Scraper

on:
  workflow_run:
    workflows: ["Scraper"]
    types: [completed]

permissions:
  contents: write

jobs:
  heal:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name  "Claude Self-Healer"
          git config user.email "claude-self-healer@users.noreply.github.com"

      - name: Run heal script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python heal.py

      - name: Commit and push fix
        run: |
          git add config.json
          git diff --cached --exit-code && echo "No changes to commit" || (
            git commit -m "fix(scraper): auto-repair CSS selectors [skip ci]" &&
            git push
          )
